<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zotroul — Dashboard Admin</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #e0d9d0;
      --shadow-d:  #c5bfb6;
      --shadow-l:  #f5ede4;
      --text:      #3a3128;
      --text-2:    #7d736a;
      --text-3:    #9e8e80;
      --blue:      #1a6bff;
      --blue-2:    #2979ff;
      --green:     #22c55e;
      --amber:     #f59e0b;
      --red:       #ef4444;
      --purple:    #8b5cf6;
    }

    html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); }

    #root { display: flex; min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--shadow-d); border-radius: 3px; }

    /* Animations */
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Leaflet popup */
    .zotroul-popup .leaflet-popup-content-wrapper {
      background: #e0d9d0;
      box-shadow: 6px 6px 16px #c5bfb6, -4px -4px 12px #f5ede4;
      border-radius: 14px;
      border: none;
    }
    .zotroul-popup .leaflet-popup-tip { background: #e0d9d0; }
    .zotroul-popup .leaflet-popup-content { margin: 14px 16px; }

    /* Button hover states */
    button:active { transform: scale(.97); }

    /* ─── Floating label fields ─── */
    .float-field { position: relative; }
    .float-field > label {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px; font-weight: 400;
      color: var(--text-3);
      font-family: 'DM Sans', sans-serif;
      pointer-events: none; line-height: 1; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: calc(100% - 28px);
      transition: top .18s ease, font-size .18s ease, color .18s ease,
                  transform .18s ease, font-weight .18s ease, letter-spacing .18s ease, left .18s ease;
    }
    .float-label-sub { margin-left: 3px; font-size: 9px; opacity: 0; transition: opacity .18s ease; }
    .float-field > input:focus + label,
    .float-field > input:not(:placeholder-shown) + label,
    .float-field > select:focus + label,
    .float-field:has(> select option:not([value=""]):checked) > label {
      top: 8px; transform: translateY(0);
      font-size: 10px; font-weight: 600; color: var(--text-2); letter-spacing: .4px;
    }
    .float-field > input:focus + label .float-label-sub,
    .float-field > input:not(:placeholder-shown) + label .float-label-sub,
    .float-field > select:focus + label .float-label-sub,
    .float-field:has(> select option:not([value=""]):checked) > label .float-label-sub { opacity: 1; }
    /* Search bar variant — label starts after the ⌕ icon, slides left when floated */
    .float-field--icon > label { left: 36px; }
    .float-field--icon > input:focus + label,
    .float-field--icon > input:not(:placeholder-shown) + label { left: 14px; }

    /* ─── Responsive layout classes ─── */
    .main-content {
      flex: 1; min-height: 100vh; overflow-y: auto; min-width: 0;
      padding: 36px 40px;
    }
    .kpi-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 28px;
    }
    .two-col-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;
    }
    .type-chips {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .session-dates-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px;
    }
    .carte-grid {
      display: grid; grid-template-columns: 260px 1fr; gap: 20px; height: 580px;
    }
    .page-header {
      display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px;
    }

    /* Sidebar */
    .sidebar {
      width: 240px; min-height: 100vh; background: #e0d9d0;
      display: flex; flex-direction: column; padding: 28px 18px;
      box-shadow: 6px 0 20px #c5bfb6; flex-shrink: 0;
      z-index: 999; transition: transform .3s ease;
    }
    .sidebar-close-btn {
      background: #e0d9d0; border: none; border-radius: 10px;
      width: 32px; height: 32px; cursor: pointer; font-size: 20px; line-height: 1;
      color: #9e8e80; box-shadow: 3px 3px 8px #c5bfb6, -3px -3px 8px #f5ede4;
      align-self: flex-end; margin-bottom: 8px; flex-shrink: 0; display: none;
    }
    .hamburger-btn { display: none; }
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(58,49,40,.4); z-index: 998;
      backdrop-filter: blur(2px); cursor: pointer;
    }
    .sidebar-overlay.open { display: block; }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed; top: 0; left: 0; height: 100vh; min-height: unset;
        width: 260px; transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); box-shadow: 8px 0 32px #c5bfb6; }
      .sidebar-close-btn { display: flex; align-items: center; justify-content: center; }
      .hamburger-btn {
        display: flex; align-items: center; justify-content: center;
        position: fixed; top: 16px; left: 16px; z-index: 997;
        background: #e0d9d0; border: none; border-radius: 10px;
        width: 40px; height: 40px; cursor: pointer; font-size: 20px; color: #3a3128;
        box-shadow: 4px 4px 10px #c5bfb6, -4px -4px 10px #f5ede4;
      }
      .main-content { padding: 68px 16px 24px; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col-grid { grid-template-columns: 1fr; }
      .page-header { flex-direction: column; gap: 12px; }
      .carte-grid { grid-template-columns: 1fr; height: auto; }
      .carte-grid > :first-child { max-height: 200px; overflow-y: auto; }
      .carte-grid > :last-child { height: 380px; }
    }

    @media (max-width: 480px) {
      .kpi-grid { grid-template-columns: 1fr; }
      .session-dates-grid { grid-template-columns: 1fr; gap: 0; }
      .main-content { padding: 68px 12px 20px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- API service -->
  <script src="api.js"></script>

  <!-- Tweaks panel -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Components -->
  <script type="text/babel" src="components.jsx"></script>

  <!-- Modals -->
  <script type="text/babel" src="modals.jsx"></script>

  <!-- Views -->
  <script type="text/babel" src="views.jsx"></script>

  <!-- Carte view (Leaflet) -->
  <script type="text/babel" src="CarteView.jsx"></script>

  <!-- Main App -->
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#44adfd",
      "sidebarWidth": 240,
      "tableDensity": "comfortable",
      "lang": "kr"
    }/*EDITMODE-END*/;

    const App = () => {
      const [page, setPage] = React.useState('dashboard');
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [sidebarOpen, setSidebarOpen] = React.useState(false);

      React.useEffect(() => {
        document.documentElement.style.setProperty('--blue', tweaks.accentColor);
      }, [tweaks.accentColor]);

      const handleNav = (p) => { setPage(p); setSidebarOpen(false); };

      const views = {
        dashboard:    <DashboardView />,
        vehicules:    <VehiculesView />,
        utilisateurs: <UtilisateursView />,
        sessions:     <SessionsView />,
        carte:        <CarteView />,
      };

      return (
        <>
          <ToastContainer />

          <div className={`sidebar-overlay${sidebarOpen ? ' open' : ''}`} onClick={() => setSidebarOpen(false)} />
          <button className="hamburger-btn" onClick={() => setSidebarOpen(true)}>☰</button>

          <Sidebar
            active={page}
            onNav={handleNav}
            lang={tweaks.lang}
            isOpen={sidebarOpen}
            onClose={() => setSidebarOpen(false)}
          />

          <main className="main-content">
            {views[page] || <DashboardView />}
          </main>

          <TweaksPanel>
            <TweakSection label="Apparence · Aparans" />
            <TweakColor
              label="Couleur accent · Koulèr aksan"
              value={tweaks.accentColor}
              onChange={v => setTweak('accentColor', v)}
            />
            <TweakSelect
              label="Densité tableau · Dansite tab"
              value={tweaks.tableDensity}
              options={['comfortable', 'compact']}
              onChange={v => setTweak('tableDensity', v)}
            />
            <TweakSection label="Langue · Lang" />
            <TweakRadio
              label="Interface"
              value={tweaks.lang}
              options={['fr', 'kr']}
              onChange={v => setTweak('lang', v)}
            />
          </TweaksPanel>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
